services:
  db:
    image: postgres:16-alpine
    container_name: traders-mate-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tradersmate
    volumes:
      - traders_mate_pg:/var/lib/postgresql/data

volumes:
  traders_mate_pg:
